    <title>CJCC members Văn Hoá Báo Chí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
      
      :root {
        --color-primary: #003399; /* Xanh Dương */
        --color-secondary: #F58220; /* Cam */
        --color-accent: #00A8E0; /* Xanh Light */
        --color-warning: #FFC800; /* Vàng */
      }

      body {
        font-family: 'Montserrat', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
      }
      
      .text-primary { color: var(--color-primary); }
      .bg-primary { background-color: var(--color-primary); }
      .text-secondary { color: var(--color-secondary); }
      .bg-secondary { background-color: var(--color-secondary); }
      .text-accent { color: var(--color-accent); }
      .bg-accent { background-color: var(--color-accent); }
      
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .modern-gradient-bg {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        background-attachment: fixed;
      }
      /* Light mode alternative for content area */
      .content-bg {
         background-image: radial-gradient(at 40% 20%, hsla(28,100%,74%,0.1) 0px, transparent 50%),
         radial-gradient(at 80% 0%, hsla(189,100%,56%,0.1) 0px, transparent 50%),
         radial-gradient(at 0% 50%, hsla(340,100%,76%,0.1) 0px, transparent 50%);
      }
    </style>
